<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0052CC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003D99;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" fill="url(#bgGrad)" rx="25"/>

  <!-- E - White -->
  <text x="60" y="130" font-family="Arial, sans-serif" font-size="110" font-weight="900" fill="white" text-anchor="middle">E</text>

  <!-- A - Yellow -->
  <text x="140" y="130" font-family="Arial, sans-serif" font-size="110" font-weight="900" fill="#FFC107" text-anchor="middle">A</text>
</svg>
