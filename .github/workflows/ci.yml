name: CI

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  backend:
    name: Backend — Maven tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: temurin

      - name: Run tests
        working-directory: applikon-backend
        run: ./mvnw test

  frontend:
    name: Frontend — Vitest + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: applikon-frontend
        run: npm ci

      - name: Run unit tests
        working-directory: applikon-frontend
        run: npm run test:run

      - name: Build
        working-directory: applikon-frontend
        run: npm run build

  docker:
    name: Docker — build and push to GHCR
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set lowercase owner
        run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v7
        with:
          context: ./applikon-backend
          push: true
          # GHCR intermittently rejects attestation manifests with "unknown blob"
          provenance: false
          tags: |
            ghcr.io/${{ env.OWNER }}/applikon-backend:latest
            ghcr.io/${{ env.OWNER }}/applikon-backend:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v7
        with:
          context: ./applikon-frontend
          push: true
          provenance: false
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_USE_BACKEND=true
          tags: |
            ghcr.io/${{ env.OWNER }}/applikon-frontend:latest
            ghcr.io/${{ env.OWNER }}/applikon-frontend:${{ github.sha }}

  track-deployment:
    name: Track deployment on GitHub
    runs-on: ubuntu-latest
    needs: [docker]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Create deployment
        id: deployment
        run: |
          echo '{
            "ref": "${{ github.sha }}",
            "environment": "production",
            "description": "Images pushed to GHCR — deploy manually on Hetzner",
            "auto_merge": false,
            "required_contexts": []
          }' > /tmp/deploy.json
          id=$(gh api repos/${{ github.repository }}/deployments --input /tmp/deploy.json --jq '.id')
          echo "id=$id" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set deployment status
        run: |
          echo '{
            "state": "success",
            "environment_url": "https://aplikujbezspiny.pl",
            "description": "Live on Hetzner"
          }' > /tmp/status.json
          gh api repos/${{ github.repository }}/deployments/${{ steps.deployment.outputs.id }}/statuses --input /tmp/status.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
