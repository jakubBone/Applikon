# Test configuration - H2 in-memory database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Disable Flyway for tests - use Hibernate ddl-auto instead
spring.flyway.enabled=false

# File upload test config
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Disable JPA auditing date provider for tests (use manual dates)
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# Google OAuth2 — placeholder credentials (real login not needed in tests)
spring.security.oauth2.client.registration.google.client-id=test-client-id
spring.security.oauth2.client.registration.google.client-secret=test-client-secret

# Admin key for tests
app.admin-key=test-admin-key

# HMAC secret for tests
app.token.hmac-secret=test-hmac-secret
