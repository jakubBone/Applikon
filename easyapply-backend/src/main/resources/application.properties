spring.application.name=easyapply-backend

# Active profile (dev by default, override with SPRING_PROFILES_ACTIVE)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# Database
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Server Configuration
server.port=${PORT:8080}

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=${UPLOAD_DIR:uploads/cv}

# Actuator - Health checks
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized

# CORS Configuration
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,email,profile

# JWT Configuration
app.jwt.access-token-expiry-minutes=${JWT_ACCESS_EXPIRY_MINUTES:15}
app.jwt.refresh-token-expiry-days=${JWT_REFRESH_EXPIRY_DAYS:7}

# Frontend URL (used for OAuth2 redirect)
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

spring.mvc.problemdetails.enabled=true

# Admin key for service notices management
app.admin-key=${ADMIN_KEY}

# HMAC secret for hashing refresh tokens
app.token.hmac-secret=${APP_TOKEN_HMAC_SECRET}

# Data retention
app.retention.inactive-months=12
