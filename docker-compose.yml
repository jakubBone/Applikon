services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: applikon-db
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - applikon-network

  # Spring Boot Backend
  backend:
    image: ghcr.io/jakubbone/applikon-backend:latest
    build:
      context: ./applikon-backend
      dockerfile: Dockerfile
    container_name: applikon-backend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      DATABASE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      DATABASE_USERNAME: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      UPLOAD_DIR: /app/uploads/cv
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      ADMIN_KEY: ${ADMIN_KEY}
      APP_TOKEN_HMAC_SECRET: ${APP_TOKEN_HMAC_SECRET}
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - applikon-network

  # React Frontend
  frontend:
    image: ghcr.io/jakubbone/applikon-frontend:latest
    build:
      context: ./applikon-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_USE_BACKEND: ${VITE_USE_BACKEND:-true}
    container_name: applikon-frontend
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - backend
    networks:
      - applikon-network

volumes:
  postgres_data:
  uploads_data:

networks:
  applikon-network:
    driver: bridge
